name: dartvex_flutter_demo
description: Demo app wiring dartvex, dartvex_codegen, and dartvex_flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  dartvex:
    path: ../../packages/dartvex
  dartvex_flutter:
    path: ../../packages/dartvex_flutter
  dartvex_local:
    path: ../../packages/dartvex_local
  dartvex_auth_better:
    path: ../../packages/dartvex_auth_better
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

dependency_overrides:
  dartvex:
    path: ../../packages/dartvex
  # path_provider_android 2.3.x migrated to a JNI plugin (jni_flutter) that fails
  # to configure on this AGP 8.11 / Gradle 8.14 toolchain:
  #   ":jni_flutter:compileReleaseJavaWithJavac > Cannot query the value of this
  #    provider because it has no value available."
  # Pin to the last method-channel release so the Android build works. Only
  # flutter_cache_manager (image disk cache) pulls path_provider here, and the
  # method-channel implementation serves it identically. Remove once the upstream
  # JNI plugin builds cleanly.
  path_provider_android: 2.2.23

flutter:
  uses-material-design: true
  assets:
    - assets/dartvex-logo.svg
    - assets/sample/

# App launcher icons generated from the Dartvex logo with `flutter_launcher_icons`.
# Regenerate after changing the masters in assets/icon/ with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/dartvex_icon.png"
  android: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/dartvex_icon_foreground.png"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: "assets/icon/dartvex_icon.png"
    background_color: "#ffffff"
    theme_color: "#0372b9"
  macos:
    generate: true
    image_path: "assets/icon/dartvex_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/dartvex_icon.png"
    icon_size: 256
