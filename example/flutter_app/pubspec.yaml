name: dartvex_flutter_demo
description: Demo app wiring dartvex, dartvex_codegen, and dartvex_flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  dartvex:
    path: ../../packages/dartvex
  dartvex_flutter:
    path: ../../packages/dartvex_flutter
  dartvex_local:
    path: ../../packages/dartvex_local
  dartvex_auth_better:
    path: ../../packages/dartvex_auth_better
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  dartvex:
    path: ../../packages/dartvex

flutter:
  uses-material-design: true
  assets:
    - assets/dartvex-logo.svg
