name: Protocol Drift Watch

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (for npm view)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore protocol cache
        uses: actions/cache@v4
        with:
          path: .protocol-cache
          key: protocol-cache-${{ github.run_id }}
          restore-keys: protocol-cache-

      - name: Run protocol watch
        id: watch
        continue-on-error: true
        run: |
          chmod +x scripts/protocol-watch.sh
          ./scripts/protocol-watch.sh 2>&1 | tee /tmp/watch-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Create issue on drift
        if: steps.watch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/watch-output.txt', 'utf8');
            const report = fs.existsSync('.protocol-cache/drift-report.md')
              ? fs.readFileSync('.protocol-cache/drift-report.md', 'utf8')
              : 'No report generated';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Protocol drift detected - ${new Date().toISOString().slice(0,10)}`,
              body: `## Protocol Drift Detected\n\nThe weekly protocol watch detected changes in the Convex sync protocol.\n\n### Watch Output\n\`\`\`\n${output}\n\`\`\`\n\n### Drift Report\n\n${report}\n\n---\n\n**Action required:** Review the changes and update our protocol implementation if needed.`,
              labels: ['protocol-drift', 'needs-review']
            });
