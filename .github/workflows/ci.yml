name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.x', channel: stable }
      - name: Resolve packages
        run: |
          for dir in packages/*/; do
            package="$(basename "$dir")"
            if [ "$package" != "dartvex" ] && grep -qE '^[[:space:]]+dartvex:' "$dir/pubspec.yaml"; then
              printf '%s\n' \
                'dependency_overrides:' \
                '  dartvex:' \
                '    path: ../dartvex' \
                > "$dir/pubspec_overrides.yaml"
            fi
            if grep -q 'sdk: flutter' "$dir/pubspec.yaml"; then
              (cd "$dir" && flutter pub get)
            else
              (cd "$dir" && dart pub get)
            fi
          done
          (cd example/flutter_app && flutter pub get)
      - name: Format check (excluding generated goldens)
        run: |
          for dir in packages/*/ example/flutter_app/; do
            (
              cd "$dir"
              paths=()
              for candidate in lib test tool bin; do
                if [ -d "$candidate" ]; then
                  paths+=("$candidate")
                fi
              done

              if [ "${#paths[@]}" -gt 0 ]; then
                find "${paths[@]}" -path '*/goldens/*' -prune -o -name '*.dart' -print0 \
                  | xargs -0r dart format --set-exit-if-changed
              fi
            )
          done

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [dartvex, dartvex_codegen, dartvex_local, dartvex_auth_better]
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - name: Use local dartvex dependency
        if: matrix.package != 'dartvex'
        run: |
          printf '%s\n' \
            'dependency_overrides:' \
            '  dartvex:' \
            '    path: ../dartvex' \
            > packages/${{ matrix.package }}/pubspec_overrides.yaml
      - run: cd packages/${{ matrix.package }} && dart pub get && dart analyze --fatal-infos

  analyze-flutter:
    name: Analyze (Flutter)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [dartvex_flutter]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.x', channel: stable }
      - name: Use local dartvex dependency
        run: |
          printf '%s\n' \
            'dependency_overrides:' \
            '  dartvex:' \
            '    path: ../dartvex' \
            > packages/${{ matrix.package }}/pubspec_overrides.yaml
      - run: cd packages/${{ matrix.package }} && flutter pub get && flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [dartvex, dartvex_codegen, dartvex_local, dartvex_auth_better]
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - name: Use local dartvex dependency
        if: matrix.package != 'dartvex'
        run: |
          printf '%s\n' \
            'dependency_overrides:' \
            '  dartvex:' \
            '    path: ../dartvex' \
            > packages/${{ matrix.package }}/pubspec_overrides.yaml
      - name: Install dependencies
        run: cd packages/${{ matrix.package }} && dart pub get
      - name: Regenerate golden files
        if: matrix.package == 'dartvex_codegen'
        run: cd packages/dartvex_codegen && dart run tool/update_goldens.dart
      - run: cd packages/${{ matrix.package }} && dart test

  test-flutter:
    name: Test (Flutter)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [dartvex_flutter]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.x', channel: stable }
      - name: Use local dartvex dependency
        run: |
          printf '%s\n' \
            'dependency_overrides:' \
            '  dartvex:' \
            '    path: ../dartvex' \
            > packages/${{ matrix.package }}/pubspec_overrides.yaml
      - run: cd packages/${{ matrix.package }} && flutter pub get && flutter test

  example-flutter:
    name: Example Flutter App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.x', channel: stable }
      - run: cd example/flutter_app && flutter pub get
      - run: cd example/flutter_app && flutter analyze --fatal-infos
      - run: cd example/flutter_app && flutter test
      - run: cd example/flutter_app && flutter build web --no-wasm-dry-run

  protocol-watch:
    name: Protocol Watch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: ./scripts/protocol-watch.sh

  web-compile:
    name: Web Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: cd packages/dartvex && dart pub get
      - name: Compile web transport test with dart2js
        run: |
          cd packages/dartvex
          dart compile js -O0 test/transport/web_transport_test.dart \
            -o /tmp/dartvex_web_transport_test.js

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: dartvex
            tool: dart
          - package: dartvex_codegen
            tool: dart
          - package: dartvex_local
            tool: dart
          - package: dartvex_flutter
            tool: flutter
          - package: dartvex_auth_better
            tool: dart
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        if: matrix.tool == 'dart'
        with: { sdk: stable }
      - uses: subosito/flutter-action@v2
        if: matrix.tool == 'flutter'
        with: { flutter-version: '3.x', channel: stable }
      - name: Use local dartvex dependency
        if: matrix.package != 'dartvex'
        run: |
          printf '%s\n' \
            'dependency_overrides:' \
            '  dartvex:' \
            '    path: ../dartvex' \
            > packages/${{ matrix.package }}/pubspec_overrides.yaml
      - name: Publish dry-run (Dart)
        if: matrix.tool == 'dart'
        run: cd packages/${{ matrix.package }} && dart pub get && dart pub publish --dry-run
      - name: Publish dry-run (Flutter)
        if: matrix.tool == 'flutter'
        run: cd packages/${{ matrix.package }} && flutter pub get && flutter pub publish --dry-run
