name: dartvex
description: >-
  Pure Dart client for Convex with WebSocket sync, type-safe values,
  and reactive subscriptions. Works on iOS, Android, web, and desktop.
version: 0.1.4
homepage: https://github.com/AndreFrelicot/dartvex
repository: https://github.com/AndreFrelicot/dartvex/tree/main/packages/dartvex
issue_tracker: https://github.com/AndreFrelicot/dartvex/issues
topics:
  - convex
  - realtime
  - websocket
  - sync
  - client

environment:
  sdk: ^3.6.0

dependencies:
  collection: ^1.19.1
  http: ^1.3.0
  meta: ^1.16.0
  uuid: ^4.5.1
  web: ^1.1.1

dev_dependencies:
  lints: ^5.1.1
  test: ^1.25.15
