name: dartvex_flutter
description: >-
  Flutter widgets for Convex — ConvexProvider, QueryBuilder, MutationBuilder,
  and more. Reactive UI powered by Dartvex.
version: 0.2.0
homepage: https://github.com/AndreFrelicot/dartvex
repository: https://github.com/AndreFrelicot/dartvex/tree/main/packages/dartvex_flutter
issue_tracker: https://github.com/AndreFrelicot/dartvex/issues
topics:
  - convex
  - realtime
  - flutter
  - sync
  - widgets

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  collection: ^1.19.1
  connectivity_plus: ^6.1.0
  cupertino_http: ^2.4.0
  dartvex: ^0.2.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  http: ^1.3.0
  meta: ^1.15.0
  objective_c: ^9.1.0
  web_socket: ^1.0.1

dev_dependencies:
  file: ^7.0.1
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  # Dart-only plugin registration: Flutter calls
  # DartvexFlutterPlugin.registerWith() before main() on these platforms,
  # which installs the NSURLSession-backed WebSocket transport as the
  # process-wide default
  # (see lib/src/transport/cupertino_web_socket_adapter.dart).
  plugin:
    platforms:
      ios:
        dartPluginClass: DartvexFlutterPlugin
      macos:
        dartPluginClass: DartvexFlutterPlugin
