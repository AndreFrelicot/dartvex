name: dartvex_codegen
description: >-
  CLI code generator for Convex backends. Generates type-safe Dart bindings
  from your Convex schema.
version: 0.1.2
homepage: https://github.com/AndreFrelicot/dartvex
repository: https://github.com/AndreFrelicot/dartvex/tree/main/packages/dartvex_codegen
issue_tracker: https://github.com/AndreFrelicot/dartvex/issues
topics:
  - convex
  - codegen
  - cli
  - schema
  - dart

environment:
  sdk: ^3.6.0

dependencies:
  args: ^2.7.0
  dart_style: ^3.1.2
  path: ^1.9.1

dev_dependencies:
  dartvex: ^0.1.0
  lints: ^5.1.1
  test: ^1.25.15
